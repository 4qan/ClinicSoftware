; CouchDB configuration template for ClinicSoftware LAN deployment
; Copy this file to C:\CouchDB\etc\local.ini (overwriting the default)
; CouchDB merges local.ini over default.ini on every start.
; NEVER edit default.ini -- it is overwritten on upgrade.

[chttpd]
bind_address = 0.0.0.0
port = 5984

[chttpd_auth]
; Use require_valid_user_except_for_up (NOT require_valid_user) so the /_up
; health endpoint remains accessible without credentials. Phase 22 connectivity
; checks use /_up to detect CouchDB availability.
require_valid_user_except_for_up = true

[httpd]
enable_cors = true

[cors]
; origins = * with credentials = false is correct for PouchDB sync, which uses
; HTTP Basic auth headers (not cookies). The CORS spec prohibits wildcard origin
; with credentialed requests; credentials = false avoids that violation.
origins = *
credentials = false
methods = GET, PUT, POST, HEAD, DELETE
headers = accept, authorization, content-type, origin, referer
